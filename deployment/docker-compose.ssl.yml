version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: discord_clone_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ../certbot/conf:/etc/letsencrypt:ro
      - ../certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - workgrid-network

  frontend:
    build:
      context: ../app
      dockerfile: ../app/Dockerfile
    container_name: discord_clone_frontend
    restart: always
    environment:
      - NODE_ENV=production
      - VITE_API_URL=https://workgrid.homeku.net/api
      - VITE_SOCKET_URL=https://workgrid.homeku.net
    depends_on:
      - backend
    networks:
      - workgrid-network

  backend:
    build:
      context: ../server
      dockerfile: ../server/Dockerfile
    container_name: discord_clone_backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - USE_POSTGRES=true
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=discord_clone
      - DB_USER=discord_user
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=https://workgrid.homeku.net
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
    depends_on:
      - db
      - redis
    networks:
      - workgrid-network

  db:
    image: postgres:15-alpine
    container_name: discord_clone_db
    restart: always
    environment:
      - POSTGRES_DB=discord_clone
      - POSTGRES_USER=discord_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - workgrid-network

  redis:
    image: redis:7-alpine
    container_name: discord_clone_redis
    restart: always
    networks:
      - workgrid-network

volumes:
  postgres_data:

networks:
  workgrid-network:
    driver: bridge
