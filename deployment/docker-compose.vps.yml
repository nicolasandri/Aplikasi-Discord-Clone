services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: workgrid-db
    restart: always
    environment:
      POSTGRES_USER: workgrid
      POSTGRES_PASSWORD: ${DB_PASSWORD:-WorkGridSecurePass123!}
      POSTGRES_DB: workgrid
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../server/migrations:/docker-entrypoint-initdb.d
    networks:
      - workgrid-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workgrid -d workgrid"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache/Session Store
  redis:
    image: redis:7-alpine
    container_name: workgrid-redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - workgrid-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: workgrid-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      USE_POSTGRES: "true"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: workgrid
      DB_USER: workgrid
      DB_PASSWORD: ${DB_PASSWORD:-WorkGridSecurePass123!}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@workgrid.app}
    volumes:
      - ../server/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - workgrid-network
    ports:
      - "3001:3001"

  # Frontend (Nginx serving built files)
  frontend:
    build:
      context: ../app
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_SOCKET_URL=wss://workgrid.homeku.net
    container_name: workgrid-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - workgrid-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: workgrid-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.vps.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ../certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - workgrid-network

  # Auto-update server for Electron
  update-server:
    image: nginx:alpine
    container_name: workgrid-updates
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ../updates:/usr/share/nginx/html:ro
    networks:
      - workgrid-network

volumes:
  postgres_data:
  redis_data:

networks:
  workgrid-network:
    driver: bridge
