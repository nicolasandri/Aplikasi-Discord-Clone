name: Deploy to VPS

on:
  push:
    branches: [ main ]
    paths:
      - 'server/**'
      - 'app/**'
      - 'docker-compose*.yml'
      - '.github/workflows/deploy-vps.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
        log-public-key: false
    
    - name: Add VPS to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H 152.42.242.180 >> ~/.ssh/known_hosts
    
    - name: Deploy to VPS
      run: |
        echo "🚀 Deploying to VPS..."
        
        # Execute deployment commands on VPS
        ssh root@152.42.242.180 << 'EOF'
          set -e
          
          echo "📦 Updating code..."
          cd /opt/workgrid
          
          # Pull latest changes
          git fetch origin
          git reset --hard origin/main
          
          echo "🐳 Rebuilding containers..."
          # Rebuild and restart backend
          docker-compose build backend
          docker-compose up -d backend
          
          # Also rebuild frontend if needed
          docker-compose build frontend
          docker-compose up -d frontend
          
          echo "🧹 Cleaning up..."
          docker system prune -f
          
          echo "✅ Deployment complete!"
          docker-compose ps
        EOF
    
    - name: Verify deployment
      run: |
        echo "🔍 Verifying deployment..."
        sleep 10
        curl -f http://152.42.242.180/health || echo "Health check failed"
        curl -f http://152.42.242.180/api/health || echo "API health check failed"
        echo "✅ Verification complete!"
